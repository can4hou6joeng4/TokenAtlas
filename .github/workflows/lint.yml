name: Lint

# SwiftLint static analysis. Runs on every push to main and on every PR.
#
# Why no path filter: a path-filtered job is "skipped" (not "success") when a PR
# touches no Swift files, which makes it unusable as a *required* status check
# (branch protection blocks the merge forever waiting for a check that never
# runs). SwiftLint finishes in seconds, so we just always run it.
#
# Why a Linux container instead of a macOS runner: SwiftLint is pure static
# analysis — it never compiles the app, so it needs neither Xcode nor the
# git submodules. Ubuntu minutes are ~10x cheaper than macOS minutes on GitHub.
#
# Why pin the exact version (0.63.3): .swiftlint-baseline was generated by this
# version. SwiftLint's rule behaviour changes between releases, so a different
# version would re-classify already-frozen debt as "new" violations and turn
# the build red for code nobody touched. Bump this tag and regenerate the
# baseline (`swiftlint lint --write-baseline .swiftlint-baseline`) together.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:0.63.3
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # SwiftLint excludes ThirdParty/ (the only submodule) anyway, so we
          # skip the expensive recursive submodule fetch that release.yml needs.
          submodules: false

      - name: SwiftLint
        # .swiftlint.yml carries `baseline: .swiftlint-baseline`, so only NEW
        # violations are reported here; the frozen existing debt stays silent.
        # `github-actions-logging` surfaces any new violation as an inline PR
        # annotation. The job fails on new *serious* (error-level) violations
        # via SwiftLint's non-zero exit code. To also hard-fail on new warnings
        # once the codebase is clean, append `--strict` below.
        run: swiftlint lint --reporter github-actions-logging
